#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "owncloud"
name = "ownCloud"
description.en = "Online storage, file sharing platform"
description.fr = "Stockage en ligne, plateforme de partage de fichiers"

version = "8.0.4~ynh1"

maintainers = ["eric_G"]

[upstream]
license = "Apache-2.0"
website = "https://owncloud.com"
demo = "https://ocis.owncloud.com"
admindoc = "https://doc.owncloud.com/ocis/next/"
code = "https://github.com/owncloud/ocis"
cpe = "cpe:2.3:a:owncloud:owncloud"

[integration]
yunohost = ">= 12.1.39"
helpers_version = "2.1"
architectures = "all"
multi_instance = false

ldap = false
sso = true

disk = "100M"
ram.build = "800M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

    [install.language]
    ask.en = "Choose the application language"
    ask.fr = "Choisissez la langue de l'application"
    type = "select"
    choices = ["cs", "de", "en", "es", "fr", "gl", "it"]
    default = "fr"

    [install.password]
    type = "password"

[resources]

    [resources.sources.main]
    amd64.url = "https://github.com/owncloud/ocis/releases/download/v8.0.4/ocis-8.0.4-linux-amd64"
    amd64.sha256 = "72437fa670288f04505c2b906826837aa08e5bb79048c82932c2f72153767245"
    arm64.url = "https://github.com/owncloud/ocis/releases/download/v8.0.4/ocis-8.0.4-linux-arm64"
    arm64.sha256 = "5c4b9d693a0bbe1991d145877ac03e6fac7e2fc46998a9bac0c169e3cf00981e"
    armhf.url = "https://github.com/owncloud/ocis/releases/download/v8.0.4/ocis-8.0.4-linux-arm"
    armhf.sha256 = "9c9cf8246238876149fe798b06782904c1fda38984e11618c4a562dab80cfbdc"
    i386.url = "https://github.com/owncloud/ocis/releases/download/v8.0.4/ocis-8.0.4-linux-386"
    i386.sha256 = "165a5b6628ba15adbe12d93bdc2da9aab7240ddc173eea71c6935f62d695a4ff"
    in_subdir = false
    rename = "ocis"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^ocis-.*-linux-amd64$"
    autoupdate.asset.arm64 = "^ocis-.*-linux-arm64$"
    autoupdate.asset.armhf = "^ocis-.*-linux-arm$"
    autoupdate.asset.i386 = "^ocis-.*-linux-386$"

    [resources.system_user]
    allow_email = true
    
    [resources.install_dir]

    [resources.data_dir]
    subdirs = ["config"]

    [resources.permissions]
    main.url = "/"
    main.auth_header = false
    api.url = "/ocs"
    api.auth_header = false
    api.show_tile = false
    api.protected= true
    api.allowed = ["visitors"]

    [resources.ports]

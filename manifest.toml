#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "owncloud"
name = "ownCloud"
description.en = "Online storage, file sharing platform"
description.fr = "Stockage en ligne, plateforme de partage de fichiers"

version = "8.0.3~ynh1"

maintainers = ["eric_G"]

[upstream]
license = "Apache-2.0"
website = "https://owncloud.com"
demo = "https://ocis.owncloud.com"
admindoc = "https://doc.owncloud.com/ocis/next/"
code = "https://github.com/owncloud/ocis"
cpe = "cpe:2.3:a:owncloud:owncloud"

[integration]
yunohost = ">= 12.1.39"
helpers_version = "2.1"
architectures = "all"
multi_instance = false

ldap = false
sso = true

disk = "100M"
ram.build = "800M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

    [install.language]
    ask.en = "Choose the application language"
    ask.fr = "Choisissez la langue de l'application"
    type = "select"
    choices = ["cs", "de", "en", "es", "fr", "gl", "it"]
    default = "fr"

    [install.password]
    type = "password"

[resources]

    [resources.sources.main]
    amd64.url = "https://github.com/owncloud/ocis/releases/download/v8.0.3/ocis-8.0.3-linux-amd64"
    amd64.sha256 = "bfd3ea9395c1720a6e430a1c799e63791145d051f375120adac86640902307ba"
    arm64.url = "https://github.com/owncloud/ocis/releases/download/v8.0.3/ocis-8.0.3-linux-arm64"
    arm64.sha256 = "2400cad539e1ae8c59e0af012aa98ba9de37cfe06fb9cec7dbb8c25bf435e792"
    armhf.url = "https://github.com/owncloud/ocis/releases/download/v8.0.3/ocis-8.0.3-linux-arm"
    armhf.sha256 = "00d14dad7111d6717b4fb925620e954d57b5d2f4ee176ad844999ee5a502a0c5"
    i386.url = "https://github.com/owncloud/ocis/releases/download/v8.0.3/ocis-8.0.3-linux-386"
    i386.sha256 = "7b4b96d795c3d0df345be5b29c5d0d8a15a1c0991fa6c4b0464e724acf34c61e"
    in_subdir = false
    rename = "ocis"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^ocis-.*-linux-amd64$"
    autoupdate.asset.arm64 = "^ocis-.*-linux-arm64$"
    autoupdate.asset.armhf = "^ocis-.*-linux-arm$"
    autoupdate.asset.i386 = "^ocis-.*-linux-386$"

    [resources.system_user]
    allow_email = true
    
    [resources.install_dir]

    [resources.data_dir]
    subdirs = ["config"]

    [resources.permissions]
    main.url = "/"
    main.auth_header = false
    api.url = "/ocs"
    api.auth_header = false
    api.show_tile = false
    api.protected= true
    api.allowed = ["visitors"]

    [resources.ports]
